<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>

    <style>
      body {
        margin: 0%;
        background: #f5efe6;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .clock-container {
        width: 320px;
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      #time {
        font-size: 60px;
        font-weight: bold;
        color: #333;
      }

      #date {
        font-size: 22px;
        margin-top: 10px;
        color: #666;
      }

      #greeting {
        font-size: 20px;
        margin-bottom: 10px;
        font-weight: 500;
        letter-spacing: 1px;
        color: #444;
      }

      button {
        margin-top: 20px;
        padding: 8px 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      body.dark {
        background: #1e1e2f;
        color: white;
      }

      body.dark .clock-container {
        background: #2c2c3c;
        color: white;
      }

      body.dark #time {
        color: white;
      }

      body.dark #date {
        color: #ccc;
      }

      body.dark #greeting {
        color: #ddd;
      }

      body.dark #weather {
        color: #bbb;
      }

      body.dark button {
        background: #444;
        color: white;
      }

      #location {
        margin-top: 8px;
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="clock-container">
      <div id="greeting"></div>
      <div id="time">00:00:00</div>
      <div id="date">Monday, 01 January, 2026</div>
      <div id="weather"></div>

      <button onclick="toggleTheme()">Toggle Theme</button>
      <button id="formatBtn" onclick="toggleFormat()">Switch 24hr</button>
    </div>

    <script>
      //function - Task to show current time and date
      let is24Hour = false;

      function toggleFormat() {
        is24Hour = !is24Hour

        document.getElementById("formatBtn").textContent =
        is24Hour ? "Switch to 12h" : "Switch to 12h"

        console.log("is24Hour", is24Hour)
      }

      function toggleTheme() {
        document.body.classList.toggle("dark");
      }

      //Background Updation
      function updateBackground(hours) {
        if (hours >= 5 && hours < 12) {
          document.body.style.background = "#f5efe6"; //morning beige
        } else if (hours >= 12 && hours < 18) {
          document.body.style.background = "#f0d9b5"; //afternoon warm
        } else if (hours >= 18 && hours < 21) {
          document.body.style.background = "#d9c2a3"; //evening
        } else {
          document.body.style.background = "#1e1e2f"; //night
        }
      }

      //Weather
      navigator.geolocation.getCurrentPosition(async (position) => {
        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        let apiKey = "835e3bf61b150f9ae14d2820534fe264";

        let url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

        let response = await fetch(url);
        let data = await response.json();

        document.getElementById("weather").innerHTML =
          data.name + " • " + data.main.temp + "°C • " + data.weather[0].main;
      });

      function showClock() {
        //Date Object
        let now = new Date();

        let hours = now.getHours(); // current hours in 24 hrs
        let minutes = now.getMinutes(); //current minutes in 24 hrs
        let seconds = now.getSeconds();

        updateBackground(hours);

        //Conversion 24 hr into 12hr
        let displayHours = hours
        let ampm = ""

        if (!is24Hour) {
          ampm = hours >= 12 ? "PM" : "AM"
        

        if (hours > 12) {
          displayHours = hours - 12
        }
        if (hours === 0) {
          displayHours = 12
        }
      }
         console.log("hours:", hours,"displayHours:", displayHours, "mode:", is24Hour)

        //Logic for mins and secs
        if (minutes < 10) {
          minutes = "0" + minutes;
        }
        if (seconds < 10) {
          seconds = "0" + seconds;
        }

        //connection js between and html
        // element = tag
        document.getElementById("time").innerHTML =
          displayHours +
          ":" +
          minutes +
          ":" +
          seconds +
          (is24Hour ? "" : " " + ampm);
        //Phase2 day, date, month, year
        let day = now.getDay(); //Monday starts with 1
        let date = now.getDate();
        let month = now.getMonth(); // January starts with 0
        let year = now.getFullYear();

        let days = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];

        let months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];

        document.getElementById("date").innerHTML =
          days[day] + " | " + date + " " + months[month] + " " + year;

        //greeting
        let currentHour = hours;
        let greeting = "";

        if (currentHour < 12) {
          greeting = "Good Morning";
        } else if (currentHour < 18) {
          greeting = "Good Afternoon";
        } else {
          greeting = "Good Evening";
        }
        document.getElementById("greeting").innerHTML = greeting;
      }

      //keep running function in 1sec
      setInterval(showClock, 1000); //pending

      showClock();
    </script>
  </body>
</html>
